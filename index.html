<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }
    .pdf-container {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div class="pdf-container">
    <!-- Embed your PDF here -->
    <embed src="Document.pdf" type="application/pdf" width="100%" height="100%">
  </div>
</body>
</html>
